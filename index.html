<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Tohshin Keiba Simulator [v2.2]</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --primary: #4ade80;
            --primary-glow: rgba(74, 222, 128, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at top right, #1a2333, #0b0f19);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 16px;
            padding-bottom: 80px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4ade80, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn 1s ease;
        }

        select {
            appearance: none;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        select option {
            background-color: #0b0f19;
            color: #f8fafc;
        }

        .race-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .race-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            cursor: pointer;
            animation: slideUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .race-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .race-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .race-id {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .race-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .horse-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .horse-row:first-of-type {
            border-top: none;
        }

        .horse-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            margin-right: 14px;
            background: rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        /* Top 3 coloring */
        .rank-1 .horse-num { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; box-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .rank-2 .horse-num { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; box-shadow: 0 0 10px rgba(148, 163, 184, 0.5); }
        .rank-3 .horse-num { background: linear-gradient(135deg, #b45309, #78350f); color: #fff; box-shadow: 0 0 10px rgba(180, 83, 9, 0.5); }

        .horse-details {
            flex-grow: 1;
        }

        .horse-name {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .horse-score-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .horse-score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #4ade80);
            border-radius: 3px;
            transition: width 1s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .horse-score-val {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            min-width: 60px;
            text-align: right;
            margin-left: 10px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a2333, #0b0f19);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 90%;
            max-width: 340px;
        }

        .auth-box h2 { margin-bottom: 20px; font-size: 1.4rem; }
        .auth-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            outline: none;
            font-size: 1rem;
        }
        .auth-box input:focus { border-color: var(--primary); }
        .auth-box button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .auth-box button:hover {
            box-shadow: 0 0 15px var(--primary-glow);
        }
        #login-error { color: #ef4444; margin-top: 10px; font-size: 0.9rem; display: none; font-weight: 600; }

        /* AI Recommendation Modal Styles */
        .pickup-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.25), rgba(59, 130, 246, 0.25));
            border: 1px solid rgba(74, 222, 128, 0.5);
            color: #4ade80;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), 0 0 15px rgba(74, 222, 128, 0.2);
            letter-spacing: 0.05em;
        }

        .pickup-badge:hover {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.4), rgba(59, 130, 246, 0.4));
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(74, 222, 128, 0.5);
            transform: translateY(-2px) scale(1.08);
        }

        /* Modal Overlay */
        #recommend-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: linear-gradient(165deg, #1e293b, #0f172a);
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            border-radius: 24px;
            border: 1px solid rgba(74, 222, 128, 0.3);
            position: relative;
            padding: 30px;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(74, 222, 128, 0.1);
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #ffffff; }

        .bet-eyes-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 16px;
            margin: 15px 0;
            border: 2px solid rgba(74, 222, 128, 0.3);
            text-align: center;
            box-shadow: inset 0 0 20px rgba(74, 222, 128, 0.05);
        }

        .bet-eyes-text {
            font-size: 1.8rem;
            font-weight: 900;
            color: #4ade80;
            font-family: 'Space Mono', monospace;
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
            letter-spacing: 0.1em;
        }

        .strategy-item-modal {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .strategy-item-modal:last-child { border-bottom: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stat-value.positive { color: #4ade80; }

        /* Highlighting Styles */
        .is-jiku {
            background: rgba(74, 222, 128, 0.12) !important;
            border-left: 5px solid #4ade80 !important;
            box-shadow: inset 0 0 20px rgba(74, 222, 128, 0.08);
        }
        .is-jiku .horse-name {
            color: #4ade80;
            font-weight: 800;
            font-size: 1.15rem;
        }
        .is-partner {
            background: rgba(254, 243, 199, 0.08) !important;
            border-left: 5px solid #fbbf24 !important;
        }
        .is-partner .horse-name {
            color: #fde68a;
            font-weight: 600;
        }

        .race-card {
            position: relative;
            overflow: hidden; /* Ensure highlighting doesn't overflow rounded corners */
        }

    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-box">
            <h2>Keiba AI Login</h2>
            <input type="password" id="auth-pw" placeholder="Password" onkeydown="if(event.key==='Enter') checkAuth()" />
            <button onclick="checkAuth()">Enter</button>
            <div id="login-error">Invalid credentials</div>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <header>
            <h1>Keiba AI</h1>
            <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">STATIC HOSTED (v4.0)</div>
        </header>

        <div class="controls-grid">
            <select id="filter-date" onchange="onDateChange()">
                <!-- Options populated by JS -->
            </select>
            <select id="filter-place" onchange="renderRaces()">
                <option value="ALL">All Places</option>
            </select>
            <select id="filter-round" onchange="renderRaces()">
                <option value="ALL">All Races</option>
            </select>
            <select id="sort-select" onchange="renderRaces()">
                <option value="score">Sort by AI Score</option>
                <option value="odds">Sort by Odds</option>
                <option value="horse_number">Sort by Horse Number</option>
            </select>
            <select id="model-select" onchange="renderRaces()" style="display: none;">
                <option value="Ensemble">Ensemble</option>
                <option value="LightGBM">LightGBM</option>
                <option value="XGBoost">XGBoost</option>
                <option value="CatBoost">CatBoost</option>
                <option value="LSTM">LSTM</option>
                <option value="RandomForest">RandomForest</option>
                <option value="DecisionTree">DecisionTree</option>
            </select>
        </div>

        <div id="races-container" class="race-list"></div>
    </div>

    <!-- Recommendation Modal -->
    <div id="recommend-modal" onclick="if(event.target===this) closeRecommendation()">
        <div class="modal-content">
            <span class="modal-close" onclick="closeRecommendation()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let currentData = {};

        async function checkAuth() {
            const pw = document.getElementById('auth-pw').value;
            if (pw === 'tohshin20') {
                // ログイン成功時にタイムスタンプを保存
                localStorage.setItem('keiba_auth_time', new Date().getTime());
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                
                loadData();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // ページ読み込み時に認証チェック
        window.onload = function() {
            const authTime = localStorage.getItem('keiba_auth_time');
            if (authTime) {
                const now = new Date().getTime();
                const diffHours = (now - parseInt(authTime)) / (1000 * 60 * 60);
                if (diffHours < 24) {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    loadData();
                    return;
                }
            }
            // 認証が必要な場合
            document.getElementById('auth-overlay').style.display = 'flex';
        };

        let metaData = {};
        let loadedDates = new Set();

        async function loadData() {
            const container = document.getElementById('races-container');
            container.innerHTML = '<div style="text-align:center; padding: 40px;"><p>Loading configuration...</p></div>';

            try {
                // 1. メタデータと単勝データの取得
                const [metaRes, tanshoRes] = await Promise.all([
                    fetch('jsons/meta.json?t=' + new Date().getTime()),
                    fetch('jsons/tansho_data.json?t=' + new Date().getTime())
                ]);

                if (!metaRes.ok) throw new Error('Meta data fetch failed');
                metaData = await metaRes.json();
                
                if (tanshoRes.ok) {
                    window.tanshoData = await tanshoRes.json();
                } else {
                    console.warn("tansho_data.json not found.");
                    window.tanshoData = {};
                }

                // 日付フィルタの初期化
                initFilters();

                // 最新日のデータをロード
                if (metaData.latest) {
                    await fetchDateData(metaData.latest);
                }
                
                renderRaces();
            } catch (error) {
                console.error("Fetch error details: ", error);
                container.innerHTML = `<div style="text-align:center; padding: 40px; color: #ef4444;"><p>${error.message}</p></div>`;
            }
        }

        async function fetchDateData(date) {
            if (loadedDates.has(date)) return;
            
            const container = document.getElementById('races-container');
            const originalContent = container.innerHTML;
            container.innerHTML = `<div style="text-align:center; padding: 20px;"><p>Fetching data for ${date}...</p></div>` + originalContent;

            try {
                const res = await fetch(`jsons/data_${date}.json?t=` + new Date().getTime());
                if (!res.ok) throw new Error(`Failed to load data for ${date}`);
                const newData = await res.json();
                
                // 既存のデータとマージ
                Object.assign(currentData, newData);
                loadedDates.add(date);
                
                container.innerHTML = originalContent; // ローディング表示を戻す
            } catch (error) {
                console.error(error);
                alert(`Error loading data for ${date}`);
                container.innerHTML = originalContent;
            }
        }

        function initFilters() {
            const dp = document.getElementById('filter-date');
            dp.innerHTML = '';
            
            const datesArr = metaData.dates || [];
            
            datesArr.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d; opt.innerText = d;
                dp.appendChild(opt);
            });
            
            if (metaData.latest) {
                dp.value = metaData.latest;
            }
            
            // Round フィルタの選択肢を初期化 (1R-12R)
            const rp = document.getElementById('filter-round');
            rp.innerHTML = '<option value="ALL">All Races</option>';
            for (let i = 1; i <= 12; i++) {
                const opt = document.createElement('option');
                opt.value = String(i);
                opt.innerText = i + "R";
                rp.appendChild(opt);
            }
            
            updatePlaceFilter();
        }

        async function onDateChange() {
            const dp = document.getElementById('filter-date');
            const selectedDate = dp.value;
            
            if (selectedDate && !loadedDates.has(selectedDate)) {
                await fetchDateData(selectedDate);
            }
            
            updatePlaceFilter();
            renderRaces();
        }

        function updatePlaceFilter() {
            const dp = document.getElementById('filter-date');
            const pp = document.getElementById('filter-place');
            const selectedDate = dp.value;
            
            const prevValue = pp.value;
            pp.innerHTML = '<option value="ALL">All Places</option>';
            
            const placesForDate = [...new Set(
                Object.values(currentData)
                    .filter(r => r.date === selectedDate)
                    .map(r => r.place)
                    .filter(p => p && p.trim() !== '' && !/^\d+$/.test(p))
            )].sort();
            
            placesForDate.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.innerText = p;
                pp.appendChild(opt);
            });
            
            // Try to restore previous selection if valid
            if (placesForDate.includes(prevValue)) {
                pp.value = prevValue;
            }
        }

        function renderRaces() {
            const container = document.getElementById('races-container');
            container.innerHTML = '';
            
            const sortBy = document.getElementById('sort-select').value;
            const sortModel = document.getElementById('model-select').value;
            const mSelect = document.getElementById('model-select');
            const fDate = document.getElementById('filter-date').value;
            const fPlace = document.getElementById('filter-place').value;
            const fRound = document.getElementById('filter-round').value;

            // Show model selector only when sorting by score
            if (sortBy === 'score') {
                mSelect.style.display = 'inline-block';
            } else {
                mSelect.style.display = 'none';
            }

            let delay = 0;

            for (const [raceId, raceData] of Object.entries(currentData)) {
                
                // Filtering
                if (fDate !== 'ALL' && raceData.date !== fDate) continue;
                if (fPlace !== 'ALL' && raceData.place !== fPlace) continue;
                if (fRound !== 'ALL' && String(raceData.round) !== String(fRound)) continue;

                // Sort horses
                let sortedHorses = [...raceData.horses];
                
                const getWinOdds = (h) => {
                    const rIdShort = String(raceId).length === 12 ? String(raceId).substring(2) : raceId;
                    const rOdds = window.tanshoData ? (window.tanshoData[raceId] || window.tanshoData[rIdShort]) : null;
                    if (rOdds) {
                        const hO = rOdds.find(o => o[0] == h.horse_number);
                        if (hO) return parseFloat(hO[1]) || 999;
                    }
                    return 999;
                };

                if (sortBy === 'score') {
                    const mKey = (sortModel === 'Ensemble') ? 'Ensemble' : sortModel + '_raw';
                    sortedHorses.sort((a, b) => (parseFloat(b[mKey]) || 0)  - (parseFloat(a[mKey]) || 0));
                } else if (sortBy === 'odds') {
                    sortedHorses.sort((a, b) => getWinOdds(a) - getWinOdds(b));
                } else {
                    sortedHorses.sort((a, b) => (parseInt(a.horse_number) || 0)  - (parseInt(b.horse_number) || 0));
                }

                // Decide main score vs sub scores display key for the whole race
                const mainModelKey = (sortBy === 'score') ? ((sortModel === 'Ensemble') ? 'Ensemble' : sortModel + '_raw') : 'Ensemble';

                // --- 1. Calculate Z-Scores for Each Model Per Race ---
                const scoreModels = ['LightGBM_raw', 'XGBoost_raw', 'CatBoost_raw', 'LSTM_raw', 'RandomForest_raw', 'DecisionTree_raw', 'Ensemble'];
                const raceStats = {};
                scoreModels.forEach(m => {
                    const vals = raceData.horses.map(h => parseFloat(h[m]) || 0);
                    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
                    const variance = vals.map(v => Math.pow(v - mean, 2)).reduce((a, b) => a + b, 0) / vals.length;
                    const std = Math.sqrt(variance) || 1.0;
                    raceStats[m] = { mean, std };
                });

                // Helper to get Z-Score (Synchronized between Display and Logic)
                const getZ = (h, m) => {
                    const stats = raceStats[m];
                    const val = parseFloat(h[m]) || 0;
                    return (val - stats.mean) / stats.std;
                };

                // --- 2. Strategy Highlighting Calculation (Z-Score Based Thresholding) ---
                const jikuSet = new Set();
                const partnerSet = new Set();

                (raceData.strategies || []).forEach(s => {
                    const scoreKey = s.model === 'Ensemble' ? 'Ensemble' : s.model + "_raw";
                    const allSorted = [...raceData.horses].sort((a,b) => getZ(b, scoreKey) - getZ(a, scoreKey));
                    if (allSorted.length === 0) return;

                    const sThRaw = parseFloat(s.score_th);
                    const a2ThRaw = parseFloat(s.axis2_score_th);
                    const pThRaw = parseFloat(s.partner_score_th);
                    const sTh = isNaN(sThRaw) ? -9.9 : sThRaw;
                    const a2Th = isNaN(a2ThRaw) ? pThRaw : (isNaN(a2ThRaw) ? -9.9 : a2ThRaw); // axis2 missing -> use partner_th
                    const pTh = isNaN(pThRaw) ? -9.9 : pThRaw;

                    if (s.type === "単勝") {
                        if (getZ(allSorted[0], scoreKey) >= sTh) {
                            jikuSet.add(String(allSorted[0].horse_number));
                        }
                    } else if (s.type.includes("BOX")) {
                        const count = parseInt(s.partners) || 5;
                        const valid = allSorted.filter(h => getZ(h, scoreKey) >= sTh);
                        if (valid.length >= count) {
                            valid.slice(0, count).forEach(h => partnerSet.add(String(h.horse_number)));
                        }
                    } else {
                        const axisCount = parseInt(s.axis_count) || 1;
                        const partnerCount = parseInt(s.partners) || 5;
                        
                        // 1軸目の判定
                        const axes1 = allSorted.filter(h => getZ(h, scoreKey) >= sTh).slice(0, 1);
                        if (axes1.length > 0) {
                            let finalAxes = [...axes1];
                            let others = allSorted.filter(h => h.horse_number !== axes1[0].horse_number);
                            
                            // 2軸目がある場合
                            if (axisCount >= 2) {
                                const axis2Candidate = others.filter(h => getZ(h, scoreKey) >= a2Th).slice(0, axisCount - 1);
                                if (axis2Candidate.length < axisCount - 1) {
                                    return; // 2軸目が条件を満たさない場合はこの戦略はスキップ
                                }
                                finalAxes = finalAxes.concat(axis2Candidate);
                                const axis2Numbers = new Set(axis2Candidate.map(ax => ax.horse_number));
                                others = others.filter(h => !axis2Numbers.has(h.horse_number));
                            }

                            const partners = others.filter(h => getZ(h, scoreKey) >= pTh).slice(0, partnerCount);
                            
                            if (partners.length > 0) {
                                finalAxes.forEach(h => jikuSet.add(String(h.horse_number)));
                                partners.forEach(h => partnerSet.add(String(h.horse_number)));
                            }
                        }
                    }
                });

                // --- Calculate Softmax Probabilities (Top 8 Softmax using Ensemble) ---
                const sortedByScore = [...raceData.horses].sort((a, b) => (parseFloat(b.Ensemble) || 0) - (parseFloat(a.Ensemble) || 0));
                const top8Horses = sortedByScore.slice(0, 8);
                
                const top8Scores = top8Horses.map(h => parseFloat(h.Ensemble) || 0);
                const maxEns = top8Scores.length > 0 ? Math.max(...top8Scores) : 0;
                const expScores = top8Scores.map(s => Math.exp(s - maxEns));
                const sumExp = expScores.reduce((a, b) => a + b, 0);
                
                sortedHorses.forEach(h => { h.pWin = 0; });
                
                top8Horses.forEach((h, idx) => {
                    h.pWin = expScores[idx] / sumExp;
                });

                // calculate max score for bar formatting based on main model
                const allMainScores = sortedHorses.map(h => parseFloat(h[mainModelKey]) || 0);
                const maxScore = Math.max(...allMainScores, 0.1);
                const minScore = Math.min(...allMainScores, 0);

                const card = document.createElement('div');
                card.className = 'race-card';
                card.style.animationDelay = `${delay}ms`;
                delay += 50;

                let horsesHtml = '';

                    const ensScore = parseFloat(horse.Ensemble) || 0;
                    const pWin = horse.pWin || 0;
                    
                    // Normalize width for bar
                    let widthPct = 0;
                    const mainScoreVal = parseFloat(horse[mainModelKey]) || 0;
                    if(maxScore > 0) {
                        widthPct = Math.max(5, ((mainScoreVal - Math.min(0, minScore)) / (maxScore - Math.min(0, minScore))) * 100);
                    }
                    
                    // Get Win Odds and calculate KV
                    // Support both 12-digit (2026...) and 10-digit (26...) keys

                    const raceWinOdds = window.tanshoData ? (window.tanshoData[raceId] || window.tanshoData[raceIdShort]) : null;
                    let winOdds = "-";
                    let kv = 0;
                    if (raceWinOdds) {

                        if (horseOdds) {
                            winOdds = horseOdds[1];
                            kv = pWin * parseFloat(winOdds);
                        }
                    }
                    
                    let rankClass = '';

                    // Decide main score vs sub scores display

                    let subScoresHtml = '';

                                        <div class="horse-score-bar-fill" style="width: 0%" data-target="${widthPct}%"></div>
                                    </div>
                                </div>
                                <div class="horse-score-val" title="${mainModelKey} Z-Score">${getZ(horse, mainModelKey).toFixed(4)}</div>
                            </div>
                            <div style="display: flex; width: 100%; justify-content: flex-end; gap: 6px; font-size: 0.72rem; color: var(--text-muted); flex-wrap: wrap; margin-left: 50px;">

                card.innerHTML = `

                                <a href="https://netkeiba.onelink.me/Wmzg?af_xp=custom&af_dp=jp.co.netdreamers.netkeiba%3A%2F%2F&deep_link_value=https%3A%2F%2Frace.sp.netkeiba.com%2Frace%2Fshutuba.html%3Frace_id%3D${raceData.race_id}&rf=race_toggle_menu" style="color:var(--primary); text-decoration:none; background:rgba(74, 222, 128, 0.1); padding: 2px 8px; border-radius: 6px; border: 1px solid var(--primary);">🏇 App</a>

                        ${( () => {

        function generateBettingEyes(horses, strategy, stats) {
            const scoreKey = strategy.model === 'Ensemble' ? 'Ensemble' : strategy.model + "_raw";
            const getZ = (h) => {
                const s = stats[scoreKey];
                return ((parseFloat(h[scoreKey]) || 0) - s.mean) / s.std;
            };
            
            const allSorted = [...horses].sort((a,b) => getZ(b) - getZ(a));
            const pad = (n) => String(n).padStart(2, '0');
            if (allSorted.length === 0) return "--";

            const sThRaw = parseFloat(strategy.score_th);
            const a2ThRaw = parseFloat(strategy.axis2_score_th);
            const pThRaw = parseFloat(strategy.partner_score_th);
            const sTh = isNaN(sThRaw) ? -9.9 : sThRaw;
            const a2Th = isNaN(a2ThRaw) ? pThRaw : (isNaN(a2ThRaw) ? -9.9 : a2ThRaw);
            const pTh = isNaN(pThRaw) ? -9.9 : pThRaw;

            // 単勝
            if (strategy.type === "単勝") {
                if (getZ(allSorted[0]) < sTh) return "--";
                return pad(allSorted[0].horse_number);
            }
            
            // BOX
            if (strategy.type.includes("BOX")) {
                const count = parseInt(strategy.partners) || 5;
                const valid = allSorted.filter(h => getZ(h) >= sTh);
                // 閾値を超えた馬が指定頭数(count)に満たない場合は、不成立として扱う
                if (valid.length < count) return "--";
                
                const finalValid = valid.slice(0, count);
                if (finalValid.length < 2) return "--";
                return finalValid.map(h => pad(h.horse_number)).join(',');
            }

            const axisCount = parseInt(strategy.axis_count) || 1;
            const partnerCount = parseInt(strategy.partners) || 5;
            
            // 軸1
            const axes1 = allSorted.filter(h => getZ(h) >= sTh).slice(0, 1);
            if (axes1.length < 1) return "--";
            
            let finalAxes = [...axes1];
            let remaining = allSorted.filter(h => h.horse_number !== axes1[0].horse_number);

            // 軸2
            if (axisCount >= 2) {
                const axes2 = remaining.filter(h => getZ(h) >= a2Th).slice(0, axisCount - 1);
                if (axes2.length < axisCount - 1) return "--";
                finalAxes = finalAxes.concat(axes2);
                const axis2Set = new Set(axes2.map(ax => ax.horse_number));
                remaining = remaining.filter(h => !axis2Set.has(h.horse_number));
            }

            const partners = remaining.filter(h => getZ(h) >= pTh).slice(0, partnerCount);
            if (partners.length === 0) return "--";

            return finalAxes.map(h => pad(h.horse_number)).join(' → ') + " → " + partners.map(h => pad(h.horse_number)).join(',');
        }

                        <div style="font-size: 0.65rem; color: var(--text-muted); text-align: right; margin-top: 10px; opacity: 0.7;">

                                ? `Z-Score: score > ${s.score_th} / ROI ${s.roi}%`

                            }
                        </div>

            container.innerHTML = html;

        async function retryFetchResults() {
            if (!lastModalRaceId) return;
            const resDiv = document.getElementById('modal-results-container');
            if (resDiv) {
                resDiv.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:0.8rem;">Reloading race results...</div>';
            }
            
            const results = await fetchRaceResults(lastModalRaceId);
            if (results) {
                renderResults(results);
                // 戦略リストも的中判定ありで再描画
                showRecommendationRecursive(lastModalRaceId, results);
            } else {
                if (resDiv) {
                    resDiv.innerHTML = `
                        <div style="text-align:center; color:var(--text-muted); font-size:0.8rem;">
                            Result not yet available.

                        </div>`;
                }
            }
        }

        function showRecommendationRecursive(raceId, results) {
            const raceData = currentData[raceId];
            if (!raceData) return;
            
            const scoreModels = ['LightGBM_raw', 'XGBoost_raw', 'CatBoost_raw', 'LSTM_raw', 'RandomForest_raw', 'DecisionTree_raw', 'Ensemble'];
            const stats = {};
            scoreModels.forEach(m => {
                const horses = raceData.horses || [];
                const vals = horses.map(h => parseFloat(h[m]) || 0);
                const mean = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
                const variance = vals.length > 0 ? vals.map(v => Math.pow(v - mean, 2)).reduce((a, b) => a + b, 0) / vals.length : 0;
                const std = Math.sqrt(variance) || 1.0;
                stats[m] = { mean, std };
            });

            const strategyItems = raceData.strategies.map(s => {
                return { strategy: s, eyes: generateBettingEyes(raceData.horses, s, stats) };
            }).filter(item => item.eyes !== '--');
            
            const finalStrategyItems = deduplicateStrategies(strategyItems);
            renderStrategies(finalStrategyItems, results);
        }

        function deduplicateStrategies(items) {
            const uniqueMap = new Map();
            items.forEach(item => {
                const key = `${item.strategy.type}_${item.strategy.model}`;
                const current = uniqueMap.get(key);
                if (!current || (parseFloat(item.strategy.roi) || 0) > (parseFloat(current.strategy.roi) || 0)) {
                    uniqueMap.set(key, item);
                }
            });
            return Array.from(uniqueMap.values());
        }

        async function fetchRaceResults(raceId) {
            console.log("[DEBUG] fetchRaceResults entry, raceId:", raceId);
            let fullRaceId = String(raceId);
            if (fullRaceId.length === 10) {
                fullRaceId = "20" + fullRaceId;
            }
            
            console.log("[DEBUG] Fetching results for race:", fullRaceId);
            const url = `https://race.sp.netkeiba.com/?pid=race_result&race_id=${fullRaceId}&t=${new Date().getTime()}`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
            
            try {
                const res = await fetch(proxyUrl);
                console.log("[DEBUG] Fetch response status:", res.status);
                
                // netkeibaはEUC-JPを使用しているため、明示的にデコードする
                const buffer = await res.arrayBuffer();
                let html = new TextDecoder('euc-jp').decode(buffer);
                
                // 万が一デコードが怪しい場合（日本語が含まれない等）はUTF-8を試す
                if (!html.includes('払戻') && !html.includes('結果')) {
                    console.log("[DEBUG] euc-jp decoding seems failed, trying utf-8");
                    html = new TextDecoder('utf-8').decode(buffer);
                }

                console.log("[DEBUG] Fetch HTML length:", html.length);
                console.log("[DEBUG] HTML Preview:", html.substring(0, 200).replace(/\s+/g, ' '));
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const results = { nums: {}, pays: {} };
                // netkeiba SP版の払戻テーブルは複数のクラス名の可能性がある
                const tables = doc.querySelectorAll('table.Pay_Table_01, table.Result_Pay_Table, table.Payout_Detail_Table, table.ResultRefund, .RaceCommon_Table.ResultRefund');
                console.log("[DEBUG] Found payout tables count:", tables.length);
                
                tables.forEach((table, tIdx) => {
                    const rows = table.querySelectorAll('tr');
                    console.log(`[DEBUG] Table ${tIdx} (${table.className}) rows count:`, rows.length);
                    
                    rows.forEach(row => {
                        const th = row.querySelector('th');
                        let typeText = th ? th.innerText.trim() : "";
                        if (!typeText) return;

                        // 文字化け文字を日本語に置換して正規化
                        typeText = typeText.replace(/ñ/g, '単').replace(/ʣ/g, '複').replace(/Ϣ/g, '連');

                        const tds = row.querySelectorAll('td');
                        let numbers = Array.from(row.querySelectorAll('.Num')).map(n => n.innerText.trim().replace(/[^0-9]/g, ''));
                        
                        // クラス名で取れない場合のフォールバック (tdの並びから取得)
                        if (numbers.length === 0 && tds.length >= 1) {
                            numbers = tds[0].innerText.trim().split(/\s+/).map(n => n.replace(/[^0-9]/g, '')).filter(n => n.length > 0);
                        }

                        // .Payクラス優先、なければ2番目のTDを使用。innerHTMLで取得してBR分割
                        const payCell = row.querySelector('.Pay') || tds[1];
                        let payTextArr = [];
                        if (payCell) {
                            payTextArr = payCell.innerHTML.split(/<br\s*\/?>/i)
                                .map(h => h.replace(/<[^>]*>/g, '').replace(/[^0-9]/g, ''))
                                .filter(v => v.length > 0);
                        }
                        const pays = payTextArr.map(v => parseInt(v) || 0);

                        console.log(`[DEBUG] Row processing: type=${typeText}, nums=${numbers.join(',')}, pays=${pays.join('|')}`);

                        if (typeText.includes("単勝") || typeText === "単") {
                            results.nums.tan = numbers;
                            results.pays.tan = pays[0] || 0;
                        } else if (typeText.includes("複勝") || typeText === "複") {
                            if (!results.nums.fuku) { results.nums.fuku = []; results.pays.fuku = []; }
                            numbers.forEach((n, i) => {
                                results.nums.fuku.push(n);
                                results.pays.fuku.push(pays[i] || 0);
                            });
                        } else if (typeText.includes("馬連") || (typeText.includes("馬") && typeText.includes("連"))) {
                            results.nums.umaren = []; results.pays.umaren = [];
                            for (let i = 0; i < numbers.length; i += 2) {
                                if (numbers[i+1]) {
                                    results.nums.umaren.push(numbers[i] + '-' + numbers[i+1]);
                                    results.pays.umaren.push(pays[Math.floor(i/2)] || 0);
                                }
                            }
                        } else if (typeText.includes("馬単") || (typeText.includes("馬") && typeText.includes("単"))) {
                            results.nums.umatan = []; results.pays.umatan = [];
                            for (let i = 0; i < numbers.length; i += 2) {
                                if (numbers[i+1]) {
                                    results.nums.umatan.push(numbers[i] + '-' + numbers[i+1]);
                                    results.pays.umatan.push(pays[Math.floor(i/2)] || 0);
                                }
                            }
                        } else if (typeText.includes("ワイド") || typeText.includes("ワイ")) {
                            if (!results.nums.wide) { results.nums.wide = []; results.pays.wide = []; }
                            for (let i = 0, pIdx = 0; i < numbers.length; i += 2, pIdx++) {
                                if (numbers[i+1]) {
                                    results.nums.wide.push(numbers[i].padStart(2, '0') + '-' + numbers[i+1].padStart(2, '0'));
                                    results.pays.wide.push(pays[pIdx] || 0); 
                                }
                            }
                        } else if (typeText.includes("3連複") || (typeText.includes("3") && typeText.includes("複"))) {
                            results.nums.sanrenpuku = []; results.pays.sanrenpuku = [];
                            for (let i = 0; i < numbers.length; i += 3) {
                                if (numbers[i+2]) {
                                    results.nums.sanrenpuku.push(numbers[i] + '-' + numbers[i+1] + '-' + numbers[i+2]);
                                    results.pays.sanrenpuku.push(pays[Math.floor(i/3)] || 0);
                                }
                            }
                        } else if (typeText.includes("3連単") || (typeText.includes("3") && typeText.includes("単"))) {
                            results.nums.sanrentan = []; results.pays.sanrentan = [];
                            for (let i = 0; i < numbers.length; i += 3) {
                                if (numbers[i+2]) {
                                    results.nums.sanrentan.push(numbers[i] + '-' + numbers[i+1] + '-' + numbers[i+2]);
                                    results.pays.sanrentan.push(pays[Math.floor(i/3)] || 0);
                                }
                            }
                        }
                    });
                });

                console.log("[DEBUG] Final parsed results:", JSON.stringify(results));
                return (Object.keys(results.nums).length > 0) ? results : null;
            } catch (e) {
                console.error("[DEBUG] Result fetch error:", e);
                return null;
            }
        }

        function checkHit(eyes, type, results) {
            console.log("[DEBUG] checkHit processing:", { type, eyes });
            if (!results || !results.nums) return 0;

            // 券種のベースキーを特定 (全角・表記揺れ対応)
            let baseKey = "";
            const normType = type.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace('三連', '3連');
            
            if (normType.includes("3連単")) baseKey = "sanrentan";
            else if (normType.includes("3連複")) baseKey = "sanrenpuku";
            else if (normType.includes("馬単")) baseKey = "umatan";
            else if (normType.includes("馬連")) baseKey = "umaren";
            else if (normType.includes("ワイド")) baseKey = "wide";
            else if (normType.includes("単勝")) baseKey = "tan";
            else if (normType.includes("複勝")) baseKey = "fuku";

            let totalReturn = 0;
            const resNums = results.nums[baseKey]; 
            const resPays = results.pays[baseKey];
            if (!resNums || resNums.length === 0) return 0;

            const parts = eyes.split(' → ');
            const axes = parts.slice(0, parts.length - 1).map(p => p.split(',').map(n => n.trim().padStart(2, '0')));
            const partners = parts[parts.length - 1].split(',').map(n => n.trim().padStart(2, '0'));
            const allSelected = axes.flat().concat(partners);

            resNums.forEach((winCombo, winIdx) => {
                const winHorses = winCombo.split('-').map(n => n.padStart(2, '0'));
                const currentPay = Array.isArray(resPays) ? resPays[winIdx] : resPays;

                // 1. 単勝・複勝
                if (baseKey === "tan" || baseKey === "fuku") {
                    if (winHorses.includes(eyes.padStart(2, '0'))) totalReturn += currentPay;
                }
                // 2. BOX馬券 (順不同)
                else if (type.includes("BOX")) {
                    const horses = eyes.split(',').map(n => n.trim().padStart(2, '0'));
                    if (winHorses.every(h => horses.includes(h))) totalReturn += currentPay;
                }
                // 3. マルチ / 3連複 / 馬連 / ワイド (順不動・軸指定あり)
                else if (type.includes("マルチ") || baseKey === "sanrenpuku" || baseKey === "umaren" || baseKey === "wide") {
                    if (winHorses.every(h => allSelected.includes(h)) && axes.flat().every(a => winHorses.includes(a))) totalReturn += currentPay;
                } 
                // 4. 流し (順序指定: 3連単, 馬単)
                else if (baseKey === "umatan") {
                    if (axes[0].includes(winHorses[0]) && partners.includes(winHorses[1])) totalReturn += currentPay;
                } else if (baseKey === "sanrentan") {
                    if (axes.length === 1) { // 1頭軸流し
                        if (axes[0].includes(winHorses[0]) && partners.includes(winHorses[1]) && partners.includes(winHorses[2])) totalReturn += currentPay;
                    } else if (axes.length === 2) { // 2頭軸流し
                        if (axes[0].includes(winHorses[0]) && axes[1].includes(winHorses[1]) && partners.includes(winHorses[2])) totalReturn += currentPay;
                    }
                }
            });

            return totalReturn;
        }

        function calculateCombinations(eyes, type) {
            const displayType = type.replace('三連', '3連');
            if (displayType === "単勝") return 1;
            const parts = eyes.split(' → ');
            if (displayType.includes("BOX")) {
                const n = eyes.split(',').length;
                if (displayType.includes("3連単")) return n * (n - 1) * (n - 2);
                if (displayType.includes("3連複")) return n * (n - 1) * (n - 2) / 6;
                return n * (n - 1) / (displayType.includes("馬単") ? 1 : 2);
            }
            const axisCount = parts.slice(0, -1).reduce((acc, p) => acc + p.split(',').length, 0);
            const partnerCount = parts[parts.length - 1].split(',').length;
            
            if (displayType.includes("3連単")) {
                if (displayType.includes("マルチ")) {
                    return (axisCount === 1) ? partnerCount * (partnerCount - 1) * 3 : (partnerCount * 6);
                }
                return (axisCount === 1) ? partnerCount * (partnerCount - 1) : partnerCount;
            }
            if (displayType.includes("3連複")) {
                return (axisCount === 1) ? partnerCount * (partnerCount - 1) / 2 : partnerCount;
            }
            if (displayType.includes("馬単")) return displayType.includes("マルチ") ? partnerCount * 2 : partnerCount;
            if (displayType.includes("馬連") || displayType.includes("ワイド")) return displayType.includes("マルチ") ? partnerCount * 1 : partnerCount;
            return partnerCount;
        }
